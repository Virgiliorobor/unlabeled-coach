[build]
  command = "npm run build:client"
  publish = "dist/client"

# Serve the how-it-works page directly (before the SPA catch-all)
[[redirects]]
  from = "/how-it-works"
  to = "/how-it-works.html"
  status = 200

# SPA catch-all — all other routes serve the React app
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
